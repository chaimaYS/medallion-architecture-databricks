# Databricks Workflow Configuration
# Defines the orchestration of the medallion pipeline.

name: medallion_pipeline_daily
schedule:
  quartz_cron_expression: "0 0 2 * * ?"  # Daily at 2:00 AM UTC
  timezone_id: "Asia/Dubai"

tasks:
  - task_key: bronze_ingestion
    notebook_task:
      notebook_path: /Repos/production/medallion-architecture/notebooks/01_bronze_ingestion
    cluster:
      existing_cluster_id: "${CLUSTER_ID}"
    timeout_seconds: 3600
    max_retries: 2
    retry_on_timeout: true

  - task_key: silver_transformation
    depends_on:
      - task_key: bronze_ingestion
    notebook_task:
      notebook_path: /Repos/production/medallion-architecture/notebooks/02_silver_transformation
    cluster:
      existing_cluster_id: "${CLUSTER_ID}"
    timeout_seconds: 3600
    max_retries: 2

  - task_key: gold_aggregation
    depends_on:
      - task_key: silver_transformation
    notebook_task:
      notebook_path: /Repos/production/medallion-architecture/notebooks/03_gold_aggregation
    cluster:
      existing_cluster_id: "${CLUSTER_ID}"
    timeout_seconds: 1800
    max_retries: 1

email_notifications:
  on_failure:
    - data-team@company.com
  on_success:
    - data-team@company.com

tags:
  team: data-engineering
  environment: production
  pipeline: medallion
